replicaCount: 2

image:
  repository: ghcr.io/evalops/maestro
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

env:
  IDENTITY_URL: ""
  KEYS_URL: ""
  LLM_GATEWAY_URL: ""
  MEMORY_URL: ""
