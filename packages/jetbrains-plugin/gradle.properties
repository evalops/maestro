# Gradle properties for JetBrains plugin

# Use in-process Kotlin compilation to avoid daemon issues in CI
kotlin.compiler.execution.strategy=in-process

# Disable daemon for CI reliability
org.gradle.daemon=false

# Don't auto-add kotlin-stdlib - IntelliJ Platform provides it
kotlin.stdlib.default.dependency=false

# JVM settings
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
