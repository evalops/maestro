<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" width="540" height="380">
  <defs>
    <!-- Background gradient matching app theme -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c12"/>
      <stop offset="50%" style="stop-color:#08080c"/>
      <stop offset="100%" style="stop-color:#040406"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>

    <!-- Subtle glow -->
    <radialGradient id="centerGlow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </radialGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="540" height="380" fill="url(#bgGrad)"/>

  <!-- Center glow -->
  <ellipse cx="270" cy="200" rx="300" ry="200" fill="url(#centerGlow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="95" x2="540" y2="95"/>
    <line x1="0" y1="190" x2="540" y2="190"/>
    <line x1="0" y1="285" x2="540" y2="285"/>
    <line x1="135" y1="0" x2="135" y2="380"/>
    <line x1="270" y1="0" x2="270" y2="380"/>
    <line x1="405" y1="0" x2="405" y2="380"/>
  </g>

  <!-- Decorative corner accents -->
  <g stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round" opacity="0.3">
    <path d="M20 40 L20 20 L40 20" fill="none"/>
    <path d="M520 40 L520 20 L500 20" fill="none"/>
    <path d="M20 340 L20 360 L40 360" fill="none"/>
    <path d="M520 340 L520 360 L500 360" fill="none"/>
  </g>

  <!-- Instruction text -->
  <text x="270" y="70" text-anchor="middle" fill="#a1a1aa" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="500" letter-spacing="0.5">
    Drag Composer to Applications to install
  </text>

  <!-- Stylized arrow between icons -->
  <g transform="translate(270, 200)">
    <!-- Arrow body -->
    <path d="M -60 0 L 40 0" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,6"/>

    <!-- Arrow head -->
    <path d="M 35 -8 L 50 0 L 35 8" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Glow dots -->
    <circle cx="-45" cy="0" r="3" fill="#14b8a6" opacity="0.5"/>
    <circle cx="-10" cy="0" r="2" fill="#14b8a6" opacity="0.7"/>
    <circle cx="25" cy="0" r="2" fill="#14b8a6" opacity="0.6"/>
  </g>

  <!-- Icon placeholders with labels (icons will be overlaid by macOS) -->
  <!-- Left: App icon position (x: 130, y: 160 from top = 220 from bottom in DMG coords) -->
  <g transform="translate(130, 180)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  </g>

  <!-- Right: Applications folder position (x: 410) -->
  <g transform="translate(410, 180)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  </g>

  <!-- Bottom branding -->
  <text x="270" y="340" text-anchor="middle" fill="#4a4a5a" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="400">
    evalops.com
  </text>

  <!-- Subtle bottom accent line -->
  <rect x="170" y="355" width="200" height="2" rx="1" fill="url(#accentGrad)" opacity="0.2"/>
</svg>
