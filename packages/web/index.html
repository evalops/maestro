<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composer - AI Coding Assistant</title>
    <meta name="description" content="Modern web interface for Composer AI coding assistant with session management, tool integration, and beautiful design">

    <script>
        (function () {
            try {
                var stored = localStorage.getItem("composer_theme");
                var prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
                var theme = stored === "light" || stored === "dark" ? stored : (prefersLight ? "light" : "dark");
                document.documentElement.dataset.theme = theme;
            } catch (e) {
                document.documentElement.dataset.theme = "dark";
            }
        })();
    </script>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%2358a6ff'/></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;

            /* Matte Pro Theme - Enterprise Lean */
            --bg-primary: #09090b; /* Zinc 950 */
            --bg-secondary: #18181b; /* Zinc 900 */
            --bg-deep: #08090a;
            --bg-elevated: #161719;
            --bg-surface: #1a1b1e;
            --bg-panel: #27272a; /* Zinc 800 */
            --bg-panel-alt: #3f3f46; /* Zinc 700 */

            --text-primary: #f4f4f5; /* Zinc 100 */
            --text-secondary: #a1a1aa; /* Zinc 400 */
            --text-tertiary: #71717a; /* Zinc 500 */

            --border-primary: #27272a; /* Zinc 800 */
            --border-secondary: #3f3f46; /* Zinc 700 */
            --border-subtle: #141517;

            /* Refined Accents */
            --accent-amber: #d4a012;
            --accent-amber-dim: rgba(212, 160, 18, 0.12);
            --accent-blue: #3b82f6; /* Blue 500 */
            --accent-blue-dim: rgba(59, 130, 246, 0.1);
            --accent-cyan: #06b6d4; /* Cyan 500 */
            --accent-purple: #8b5cf6; /* Violet 500 */
            --accent-green: #10b981; /* Emerald 500 */
            --accent-yellow: #f59e0b; /* Amber 500 */
            --accent-red: #ef4444; /* Red 500 */

            /* Typography */
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            /* Shadows - subtle & sharp */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }

        :root[data-theme="light"] {
            color-scheme: light;

            --bg-primary: #f7f7f8;
            --bg-secondary: #ffffff;
            --bg-deep: #f0f1f3;
            --bg-elevated: #ffffff;
            --bg-surface: #f3f4f6;
            --bg-panel: #f1f2f4;
            --bg-panel-alt: #e7e9ec;

            --text-primary: #14161a;
            --text-secondary: #4b5563;
            --text-tertiary: #6b7280;

            --border-primary: #e5e7eb;
            --border-secondary: #d1d5db;
            --border-subtle: #eceff3;

            --accent-amber: #c58a05;
            --accent-amber-dim: rgba(197, 138, 5, 0.12);
            --accent-blue: #2563eb;
            --accent-blue-dim: rgba(37, 99, 235, 0.12);
            --accent-cyan: #0891b2;
            --accent-purple: #7c3aed;
            --accent-green: #059669;
            --accent-yellow: #d97706;
            --accent-red: #dc2626;

            --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.08);
            --shadow-md: 0 4px 8px -2px rgba(15, 23, 42, 0.12);
            --shadow-lg: 0 10px 24px -6px rgba(15, 23, 42, 0.18);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            selection-background-color: var(--accent-blue-dim);
        }

        composer-chat {
            display: block;
            width: 100%;
            height: 100vh;
        }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeOut 0.3s ease-out 0.5s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border-secondary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: var(--font-mono);
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Minimal scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-secondary);
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        ::selection {
            background: rgba(88, 166, 255, 0.3);
            color: var(--text-primary);
        }

        *:focus {
            outline: none;
        }

        *:focus-visible {
            outline: 1px solid var(--accent-blue);
            outline-offset: -1px;
        }
    </style>
</head>
<body>
    <!-- Loading screen -->
    <div class="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Composer...</div>
    </div>

    <!-- Main app -->
    <composer-chat
        model="claude-sonnet-4-5">
    </composer-chat>

    <script type="module" src="/src/index.ts"></script>
</body>
</html>
