[package]
name = "composer-tui"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Native terminal UI renderer for Composer"

[[bin]]
name = "composer-tui"
path = "src/main.rs"

[lib]
name = "composer_tui"
path = "src/lib.rs"

[dependencies]
# Terminal handling
crossterm = { version = "0.28", features = ["bracketed-paste", "event-stream"] }
ratatui = { version = "0.29", features = ["unstable-widget-ref"] }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "io-util", "sync", "signal", "fs", "process"] }
tokio-stream = "0.1"
futures = "0.3"

# HTTP client for AI APIs
reqwest = { version = "0.12", features = ["json", "stream"] }

# Serialization for IPC
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# SSE streaming for OpenAI Responses API
eventsource-stream = "0.2"
pin-project-lite = "0.2"

# Utilities
unicode-width = "0.2"
textwrap = "0.16"
anyhow = "1"
thiserror = "2"
once_cell = "1"
uuid = { version = "1", features = ["v4"] }
clap = { version = "4", features = ["derive"] }

# Markdown parsing
pulldown-cmark = "0.12"

# Diff generation
similar = "2"

# Random selection for tooltips
rand = "0.9"

# Terminal color detection
supports-color = "3"

# Date/time handling
chrono = "0.4"

# Clipboard support (optional)
arboard = { version = "3", optional = true }

[features]
default = []
clipboard = ["arboard"]

[dev-dependencies]
pretty_assertions = "1"
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
strip = true
