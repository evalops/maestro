<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Main gradient - deep purple to electric blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    
    <!-- Accent gradient - vibrant cyan to purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    
    <!-- Glow gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.4"/>
    </linearGradient>
    
    <!-- Inner glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Outer glow for the symbol -->
    <filter id="outerGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern overlay -->
  <g opacity="0.03">
    <line x1="32" y1="0" x2="32" y2="128" stroke="white" stroke-width="0.5"/>
    <line x1="64" y1="0" x2="64" y2="128" stroke="white" stroke-width="0.5"/>
    <line x1="96" y1="0" x2="96" y2="128" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="32" x2="128" y2="32" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="64" x2="128" y2="64" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="96" x2="128" y2="96" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Decorative corner accents -->
  <path d="M12 28 L12 12 L28 12" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M116 28 L116 12 L100 12" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M12 100 L12 116 L28 116" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M116 100 L116 116 L100 116" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Main symbol: Stylized "C" made of code brackets with flow -->
  <g filter="url(#outerGlow)" transform="translate(64, 64)">
    <!-- Outer arc - representing composition/flow -->
    <path d="M 8 -32 
             A 32 32 0 1 0 8 32" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="6" 
          stroke-linecap="round"
          opacity="0.9"/>
    
    <!-- Inner bracket hints - code aesthetic -->
    <path d="M -8 -20 L -16 -20 L -16 20 L -8 20" 
          fill="none" 
          stroke="url(#glowGrad)" 
          stroke-width="3" 
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- Cursor/caret element -->
    <rect x="-4" y="-14" width="3" height="28" rx="1.5" fill="#00d9ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Data flow dots -->
    <circle cx="20" cy="-16" r="3" fill="#00d9ff" opacity="0.7"/>
    <circle cx="26" cy="0" r="2.5" fill="#a855f7" opacity="0.6"/>
    <circle cx="20" cy="16" r="3" fill="#6366f1" opacity="0.7"/>
  </g>
  
  <!-- Subtle bottom highlight -->
  <rect x="32" y="118" width="64" height="2" rx="1" fill="url(#accentGrad)" opacity="0.3"/>
</svg>
