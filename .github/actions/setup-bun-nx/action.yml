name: Setup Bun + Nx
description: Setup Bun, restore Bun/Nx caches, and optionally install dependencies.

inputs:
  node-version-file:
    description: Path to a Node version file (e.g. .node-version)
    required: false
    default: ".node-version"
  node-version:
    description: Node.js version to install (used only if node-version-file is empty)
    required: false
    default: ""
  bun-version:
    description: Bun version to install
    required: false
    default: "1.1.31"
  install:
    description: Whether to run bun install
    required: false
    default: "true"
  cache-bun:
    description: Whether to enable Bun cache
    required: false
    default: "true"
  cache-nx:
    description: Whether to enable Nx cache
    required: false
    default: "true"
  ensure-ripgrep:
    description: Whether to install ripgrep if missing
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node (from version file)
      if: ${{ inputs.node-version-file != '' }}
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Setup Node (from explicit version)
      if: ${{ inputs.node-version-file == '' }}
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version: ${{ inputs.node-version }}

    - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
      with:
        bun-version: ${{ inputs.bun-version }}
        no-cache: ${{ startsWith(runner.name, 'blacksmith-') || env.BLACKSMITH_ACTIONS_RESULTS_URL != '' }}

    - name: Cache Bun (Blacksmith)
      if: ${{ inputs.cache-bun == 'true' && (startsWith(runner.name, 'blacksmith-') || env.BLACKSMITH_ACTIONS_RESULTS_URL != '') }}
      uses: useblacksmith/cache@71c7c918062ba3861252d84b07fe5ab2a6b467a6 # v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Cache Bun (GitHub)
      if: ${{ inputs.cache-bun == 'true' && !(startsWith(runner.name, 'blacksmith-') || env.BLACKSMITH_ACTIONS_RESULTS_URL != '') }}
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Cache Nx (Blacksmith)
      if: ${{ inputs.cache-nx == 'true' && (startsWith(runner.name, 'blacksmith-') || env.BLACKSMITH_ACTIONS_RESULTS_URL != '') }}
      uses: useblacksmith/cache@71c7c918062ba3861252d84b07fe5ab2a6b467a6 # v5
      with:
        path: .nx/cache
        key: ${{ runner.os }}-nx-${{ hashFiles('bun.lockb', 'nx.json', 'project.json', 'packages/**/project.json') }}
        restore-keys: |
          ${{ runner.os }}-nx-

    - name: Cache Nx (GitHub)
      if: ${{ inputs.cache-nx == 'true' && !(startsWith(runner.name, 'blacksmith-') || env.BLACKSMITH_ACTIONS_RESULTS_URL != '') }}
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: .nx/cache
        key: ${{ runner.os }}-nx-${{ hashFiles('bun.lockb', 'nx.json', 'project.json', 'packages/**/project.json') }}
        restore-keys: |
          ${{ runner.os }}-nx-

    - name: Ensure ripgrep
      if: ${{ inputs.ensure-ripgrep == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v rg >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ripgrep
        fi

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: bun install --frozen-lockfile
