name: evals

on:
  push:
    branches: [main]
  pull_request:

jobs:
  run-evals:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            chunkIndex: 1
          - os: blacksmith-4vcpu-ubuntu-2404
            chunkIndex: 2
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.31
      - name: Install ripgrep (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Install ripgrep (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ripgrep
      - run: bun install
      - run: bun install --cwd packages/tui
      - run: bun install --cwd packages/web
      - name: Install Semgrep CLI
        run: python3 -m pip install --user semgrep && echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Composer Guardian
        run: bash scripts/guardian.sh --all --trigger ci
      - run: npm run build:all
      - run: bun run bun:lint
      - name: Run tests
        timeout-minutes: 3
        run: bunx vitest --run --reporter=verbose --no-file-parallelism
      - name: Run evals chunk
        env:
          COMPOSER_EVAL_CHUNK_COUNT: 2
          COMPOSER_EVAL_CHUNK_INDEX: ${{ matrix.chunkIndex }}
        run: bun run bun:evals
