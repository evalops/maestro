name: evals

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-evals:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-evals') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            chunkIndex: 1
          - os: blacksmith-4vcpu-ubuntu-2404
            chunkIndex: 2
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-bun-nx
        with:
          ensure-ripgrep: "true"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install Semgrep CLI
        env:
          UV_HTTP_TIMEOUT: "120"
        run: |
          set -e
          for attempt in 1 2 3; do
            if uv tool install "semgrep==1.144.0"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "uv tool install failed after 3 attempts" >&2
              exit 1
            fi
            echo "uv tool install attempt $attempt failed; retrying..." >&2
            sleep $((attempt * 5))
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Composer Guardian
        run: bash scripts/guardian.sh --all --trigger ci
      - run: npx nx run maestro:build:all
      - run: npx nx run maestro:lint
      - name: Run tests
        timeout-minutes: 3
        run: bunx vitest --run --reporter=verbose --no-file-parallelism --shard=${{ matrix.chunkIndex }}/2
      - name: Run evals chunk
        timeout-minutes: 45
        env:
          MAESTRO_EVAL_CHUNK_COUNT: 2
          MAESTRO_EVAL_CHUNK_INDEX: ${{ matrix.chunkIndex }}
        run: npx nx run maestro:evals
