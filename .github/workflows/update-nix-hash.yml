name: Update Nix Hash

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lockb'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hash:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: "!contains(github.event.head_commit.message, '[skip nix]')"
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Calculate new hash
        id: hash
        run: |
          # Try to build and capture the error with expected hash
          nix build .# 2>&1 | tee build.log || true
          
          # Extract the expected hash from error message
          EXPECTED_HASH=$(grep -oP 'got:\s+\K[a-zA-Z0-9+/=-]+' build.log | head -n1)
          
          if [ -z "$EXPECTED_HASH" ]; then
            echo "Could not determine hash, skipping"
            exit 0
          fi
          
          echo "new_hash=$EXPECTED_HASH" >> $GITHUB_OUTPUT

      - name: Update flake.nix
        if: steps.hash.outputs.new_hash != ''
        run: |
          sed -i "s|npmDepsHash = \"sha256-[^\"]*\"|npmDepsHash = \"${{ steps.hash.outputs.new_hash }}\"|" flake.nix

      - name: Create or update hash PR
        if: steps.hash.outputs.new_hash != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: flake.nix
          commit-message: "chore: update Nix hash [skip ci]"
          title: "chore: update Nix hash"
          body: |
            Automated update of npmDepsHash from CI.
          branch: ci/update-nix-hash
          delete-branch: true
