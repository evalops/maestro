name: Update Nix Hash

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lockb'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-hash:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    if: "!contains(github.event.head_commit.message, '[skip nix]')"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@7ac1ec25491415c381d9b62f0657c7a028df52a7 # v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Calculate new hash
        id: hash
        run: |
          # Try to build and capture the error with expected hash
          nix build .# 2>&1 | tee build.log || true
          
          # Extract the expected hash from error message
          EXPECTED_HASH=$(grep -oP 'got:\s+\K[a-zA-Z0-9+/=-]+' build.log | head -n1)
          
          if [ -z "$EXPECTED_HASH" ]; then
            echo "Could not determine hash, skipping"
            exit 0
          fi
          
          echo "new_hash=$EXPECTED_HASH" >> $GITHUB_OUTPUT

      - name: Commit hash bump
        if: steps.hash.outputs.new_hash != ''
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B ci/update-nix-hash
          sed -i "s|npmDepsHash = \"sha256-[^\"]*\"|npmDepsHash = \"${{ steps.hash.outputs.new_hash }}\"|" flake.nix
          git add flake.nix
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update Nix hash [skip ci]"

      - name: Push hash branch (no PR)
        if: steps.hash.outputs.new_hash != ''
        run: |
          if ! git push origin ci/update-nix-hash; then
            echo "::warning::Push failed (likely concurrent update). Retrying once..."
            git fetch origin ci/update-nix-hash
            git rebase --autostash origin/ci/update-nix-hash
            git push origin ci/update-nix-hash
          fi
