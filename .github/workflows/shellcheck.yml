name: shellcheck

on:
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine shellcheck targets
        id: targets
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          EMPTY_TREE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          mode="diff"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_SHA="$PUSH_BEFORE_SHA"
            HEAD_SHA="$PUSH_AFTER_SHA"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0{40}$ ]]; then
              BASE_SHA="$EMPTY_TREE_SHA"
            fi
          else
            mode="all"
          fi

          if [[ "$mode" == "diff" ]]; then
            for sha in "$BASE_SHA" "$HEAD_SHA"; do
              if [[ -z "$sha" || "$sha" == "$EMPTY_TREE_SHA" ]]; then
                continue
              fi
              if ! git cat-file -e "$sha^{commit}" 2>/dev/null; then
                git fetch --no-tags origin "$sha"
              fi
            done
            mapfile -t changed < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- '*.sh' || true)
          else
            mapfile -t changed < <(git ls-files '*.sh' || true)
          fi

          if [[ "${#changed[@]}" -eq 0 ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No .sh files to check."
            exit 0
          fi

          files=()
          for f in "${changed[@]}"; do
            if [[ -f "$f" ]]; then
              files+=("$f")
            fi
          done

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No .sh files exist in the working tree."
            exit 0
          fi

          printf '%s\n' "${files[@]}" | tee .shellcheck-files.txt
          echo "has_files=true" >> "$GITHUB_OUTPUT"

      - name: Install shellcheck
        if: ${{ steps.targets.outputs.has_files == 'true' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        if: ${{ steps.targets.outputs.has_files == 'true' }}
        run: |
          set -euo pipefail
          mapfile -t files < .shellcheck-files.txt
          shellcheck "${files[@]}"
