name: integration

on:
  push:
    branches: [main]
    paths:
      - "src/server/**"
      - "src/db/**"
      - "test/web/**"
      - "docker-compose.yml"
  pull_request:
    paths:
      - "src/server/**"
      - "src/db/**"
      - "test/web/**"
      - "docker-compose.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: composer
          POSTGRES_PASSWORD: composer
          POSTGRES_DB: composer
        options: >-
          --health-cmd "pg_isready -U composer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.1.31

      - name: Cache Bun
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: npm run build:all

      - name: Run integration tests
        env:
          COMPOSER_REDIS_URL: redis://localhost:6379
          COMPOSER_DATABASE_URL: postgresql://composer:composer@localhost:5432/composer
        run: |
          # Run all web tests with Redis and PostgreSQL available
          # Redis tests will use actual Redis instead of skipping
          bunx vitest run test/web/ --reporter=verbose
