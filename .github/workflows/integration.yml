name: integration

on:
  push:
    branches: [main]
    paths:
      - "src/server/**"
      - "src/db/**"
      - "src/rbac/**"
      - "test/db/**"
      - "test/web/**"
      - "docker-compose.yml"
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "src/server/**"
      - "src/db/**"
      - "src/rbac/**"
      - "test/db/**"
      - "test/web/**"
      - "docker-compose.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAESTRO_INTEGRATION_POSTGRES_PASSWORD: maestro

jobs:
  integration-tests:
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-integration') }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: maestro
          POSTGRES_PASSWORD: ${{ env.MAESTRO_INTEGRATION_POSTGRES_PASSWORD }}
          POSTGRES_DB: maestro
        options: >-
          --health-cmd "pg_isready -U maestro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-bun-nx

      - name: Build contracts
        run: npx nx run contracts:build

      - name: Run integration tests
        env:
          MAESTRO_REDIS_URL: redis://localhost:6379
          MAESTRO_DATABASE_URL: postgresql://maestro:${{ env.MAESTRO_INTEGRATION_POSTGRES_PASSWORD }}@localhost:5432/maestro
        run: |
          # Run web tests plus production-schema database regressions with
          # Redis and PostgreSQL available.
          bunx vitest run test/web/ test/db/legacy-rbac-migration.integration.test.ts --reporter=verbose
