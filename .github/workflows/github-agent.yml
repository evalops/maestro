name: Composer Self-Improvement

on:
  # Trigger on labeled issues
  issues:
    types: [labeled]

  # Trigger on @composer mentions in issue comments
  issue_comment:
    types: [created]

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number

permissions:
  contents: read
  issues: write

# Only allow one run at a time
concurrency:
  group: github-agent
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-issue:
    # Run on labeled issues with 'composer-task' label
    # Or on issue comments containing '@composer'
    # Or on manual trigger
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'composer-task') ||
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@composer') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main  # Always work from main branch
          fetch-depth: 0  # Full history for proper git operations

      - uses: ./.github/actions/setup-bun-nx

      - name: Build Maestro
        run: npx nx run maestro:build:all --skip-nx-cache

      - name: Determine issue number
        id: issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_ISSUE: ${{ inputs.issue_number }}
          EVENT_ISSUE: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=$DISPATCH_ISSUE" >> "$GITHUB_OUTPUT"
          else
            echo "number=$EVENT_ISSUE" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run GitHub Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          WORKSPACE: ${{ github.workspace }}
          # `maestro:build:all` emits the executable Node CLI bundle at dist/cli.js.
          # This workflow does not compile the standalone Bun binary.
          MAESTRO_BIN: ${{ github.workspace }}/dist/cli.js
        run: |
          # Build the github-agent
          cd packages/github-agent
          bun run build

          # Run for a single issue
          node dist/main.js "$REPO" \
            --issue "$ISSUE_NUMBER" \
            --working-dir "$WORKSPACE" \
            --memory-dir /tmp/agent-memory

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const issueNumber = ${{ steps.issue.outputs.number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `The GitHub Agent encountered an error while processing this issue. Check the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });
