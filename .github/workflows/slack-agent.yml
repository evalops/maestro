name: slack-agent

on:
  push:
    branches: [main]
    paths:
      - "packages/slack-agent/**"
      - ".github/workflows/slack-agent.yml"
  pull_request:
    paths:
      - "packages/slack-agent/**"
      - ".github/workflows/slack-agent.yml"

jobs:
  build-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.31

      - name: Install dependencies
        run: bun install

      - name: Build slack-agent
        run: npx nx run slack-agent:build

      - name: Run slack-agent tests
        run: npx nx run slack-agent:test

