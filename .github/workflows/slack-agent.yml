name: slack-agent

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/slack-agent/**"
      - "packages/ai/**"
      - ".github/workflows/slack-agent.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup-bun-nx

      - name: Build slack-agent
        run: npx nx run slack-agent:build

      - name: Run slack-agent tests
        run: npx nx run slack-agent:test
