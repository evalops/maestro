name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver (with or without leading v) to release"
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-trigger:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.inputs.version || '' }}
          REF_VALUE: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${DISPATCH_VERSION}" ]]; then
              echo "No version provided for workflow_dispatch; skipping release workflow."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [[ ! "${REF_VALUE}" =~ ^refs/tags/v ]]; then
            echo "No semver tag detected (ref=${REF_VALUE}); skipping release workflow."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

  skip-when-no-tag:
    if: ${{ needs.validate-trigger.outputs.should_run == 'false' }}
    needs: validate-trigger
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 2
    steps:
      - name: Skip release workflow
        run: |
          echo "Release workflow skipped."

  prepare:
    if: ${{ needs.validate-trigger.outputs.should_run == 'true' }}
    needs: validate-trigger
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_version: ${{ steps.release.outputs.release_version }}
      package_name: ${{ steps.release.outputs.package_name }}
      package_version: ${{ steps.release.outputs.package_version }}
      canonical_package_name: ${{ steps.release.outputs.canonical_package_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: release
        uses: ./.github/actions/release-context
        with:
          requested-version: ${{ github.event.inputs.version || github.ref_name }}
          create-tag-if-missing: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

  quality-gate:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            chunkIndex: 1
          - os: blacksmith-4vcpu-ubuntu-2404
            chunkIndex: 2
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_tag }}

      - uses: ./.github/actions/setup-bun-nx
        with:
          ensure-ripgrep: "true"

      - run: npm run release:check
      - name: Run evals chunk
        env:
          MAESTRO_EVAL_CHUNK_COUNT: 2
          MAESTRO_EVAL_CHUNK_INDEX: ${{ matrix.chunkIndex }}
        run: bun run bun:evals

  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - prepare
      - quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: npm-release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_tag }}

      - uses: ./.github/actions/setup-bun-nx
      - name: Verify release version matches package.json
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${PACKAGE_VERSION}" != "${{ needs.prepare.outputs.release_version }}" ]]; then
            echo "::error::package.json version ${PACKAGE_VERSION} does not match release version ${{ needs.prepare.outputs.release_version }}" >&2
            exit 1
          fi

      - run: npm run clean && npm run build:all
      - run: npm run verify:runtime-deps
      - name: Generate version metadata
        run: node scripts/create-version-json.js

      - name: Setup Node for npm publish
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - id: pack
        run: |
          set -euo pipefail
          PACK_JSON=$(npm pack --json)
          echo "$PACK_JSON"
          FILE=$(echo "$PACK_JSON" | jq -r '.[0].filename')
          echo "tarball=$FILE" >> "$GITHUB_OUTPUT"

      - name: Smoke-test packed CLI
        run: node scripts/smoke-packed-cli.js "${{ steps.pack.outputs.tarball }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball-${{ needs.prepare.outputs.release_tag }}
          path: ${{ steps.pack.outputs.tarball }}

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_AUTH_MODE: ${{ vars.NPM_PUBLISH_AUTH_MODE || 'auto' }}
        run: |
          set -euo pipefail
          NPM_TOKEN_FALLBACK="${NODE_AUTH_TOKEN:-}"

          publish_with_token() {
            if [ -z "${NPM_TOKEN_FALLBACK:-}" ]; then
              echo "::error::NPM_PUBLISH_AUTH_MODE=token requires the NPM_TOKEN secret."
              exit 1
            fi

            echo "Publishing with NPM_TOKEN fallback."
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN_FALLBACK" > ~/.npmrc
            NODE_AUTH_TOKEN="$NPM_TOKEN_FALLBACK" npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance
          }

          publish_with_trusted_publisher() {
            echo "Publishing with npm trusted publishing."
            unset NODE_AUTH_TOKEN
            rm -f ~/.npmrc
            npm publish "${{ steps.pack.outputs.tarball }}" --access public
          }

          case "${NPM_PUBLISH_AUTH_MODE}" in
            auto|"")
              echo "Attempting npm trusted publishing first; NPM_TOKEN is only a fallback."
              trusted_status=0
              publish_with_trusted_publisher || trusted_status=$?
              if [ "$trusted_status" -eq 0 ]; then
                exit 0
              fi

              if [ -z "${NPM_TOKEN_FALLBACK:-}" ]; then
                echo "::error::Trusted publishing failed and no NPM_TOKEN fallback is configured."
                exit "$trusted_status"
              fi

              echo "::warning::Trusted publishing failed; falling back to NPM_TOKEN. Set NPM_PUBLISH_AUTH_MODE=trusted after npm trust is verified."
              publish_with_token
              ;;
            token)
              publish_with_token
              ;;
            trusted)
              publish_with_trusted_publisher
              ;;
            *)
              echo "::error::Unsupported NPM_PUBLISH_AUTH_MODE '${NPM_PUBLISH_AUTH_MODE}'. Use auto, token, or trusted."
              exit 1
              ;;
          esac

      - name: Sync Hopper version metadata
        env:
          HOPPER_PUSH_TOKEN: ${{ secrets.HOPPER_PUSH_TOKEN }}
          HOPPER_REPOSITORY: ${{ vars.HOPPER_REPOSITORY }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          set -euo pipefail

          if [ -z "$HOPPER_PUSH_TOKEN" ]; then
            echo "HOPPER_PUSH_TOKEN secret missing; skipping Hopper sync."
            exit 0
          fi

          repo="${HOPPER_REPOSITORY:-evalops/hopper}"
          workdir=$(mktemp -d)
          trap 'rm -rf "$workdir"' EXIT

          gh auth setup-git
          gh auth status
          gh auth refresh --hostname github.com --scopes repo || true

          gh api user >/dev/null || {
            echo "gh auth not configured; initializing with provided token"
            export GH_TOKEN="$HOPPER_PUSH_TOKEN"
          }

          git clone "https://x-access-token:${HOPPER_PUSH_TOKEN}@github.com/${repo}.git" "$workdir"
          pushd "$workdir" >/dev/null
          git fetch origin main
          git checkout main
          git pull --ff-only origin main || git pull --rebase origin main

          mkdir -p public/composer
          cp "$GITHUB_WORKSPACE/dist/version.json" "public/composer/version.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git status --short | grep -q "composer"; then
            git add public/composer/version.json
            git commit -m "chore: update composer version to v${RELEASE_VERSION}"
            git push origin HEAD
          else
            echo "No changes to Hopper repository."
          fi

          popd >/dev/null

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Maestro ${{ needs.prepare.outputs.release_version }}
          generate_release_notes: true
          files: ${{ steps.pack.outputs.tarball }}

  post-publish-canary:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - prepare
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Setup Node for npm canary
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify published package from npm
        env:
          MAESTRO_REGISTRY_POLL_ATTEMPTS: "120"
          MAESTRO_REGISTRY_POLL_DELAY_MS: "5000"
        run: node scripts/smoke-registry-install.js

  notify:
    if: ${{ always() && needs.validate-trigger.outputs.should_run == 'true' && needs.prepare.result == 'success' }}
    needs:
      - validate-trigger
      - prepare
      - quality-gate
      - publish
      - post-publish-canary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Notify release channel
        continue-on-error: true
        uses: ./.github/actions/release-notify
        with:
          quality-gate-result: ${{ needs.quality-gate.result }}
          publish-result: ${{ needs.publish.result }}
          canary-result: ${{ needs.post-publish-canary.result }}
          release-version: ${{ needs.prepare.outputs.release_version }}
          package-name: ${{ needs.prepare.outputs.package_name }}
          package-version: ${{ needs.prepare.outputs.package_version }}
          webhook-url: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
