name: Rust TUI

on:
  push:
    branches: [main]
    paths:
      - "packages/tui-rs/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "packages/tui-rs/**"
      - ".github/workflows/rust.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: packages/tui-rs

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/tui-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/tui-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run all tests
        run: cargo test --all-features -- --nocapture

      - name: Run hook integration tests
        run: cargo test --test hooks_integration --all-features -- --nocapture

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Hook Integration Tests" >> $GITHUB_STEP_SUMMARY
          cargo test --test hooks_integration --all-features -- --list 2>/dev/null | grep -E "^test_" | wc -l | xargs -I {} echo "- Total tests: {}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Features Tested" >> $GITHUB_STEP_SUMMARY
          echo "- PreToolUse/PostToolUse hooks" >> $GITHUB_STEP_SUMMARY
          echo "- Session lifecycle (Start/End)" >> $GITHUB_STEP_SUMMARY
          echo "- Overflow detection" >> $GITHUB_STEP_SUMMARY
          echo "- PreMessage/PostMessage hooks" >> $GITHUB_STEP_SUMMARY
          echo "- OnError hooks" >> $GITHUB_STEP_SUMMARY
          echo "- EvalGate hooks" >> $GITHUB_STEP_SUMMARY
          echo "- Subagent lifecycle" >> $GITHUB_STEP_SUMMARY
          echo "- Permission requests" >> $GITHUB_STEP_SUMMARY
          echo "- Lua executor" >> $GITHUB_STEP_SUMMARY
          echo "- WASM executor" >> $GITHUB_STEP_SUMMARY
          echo "- IPC bridge" >> $GITHUB_STEP_SUMMARY

  hooks-coverage:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: packages/tui-rs
    needs: build

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/tui-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/tui-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage for hooks
        run: |
          cargo llvm-cov --all-features --lcov --output-path lcov.info -- --test-threads=1
        continue-on-error: true

      - name: Coverage summary
        if: always()
        run: |
          echo "## Hook Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f lcov.info ]; then
            echo "Coverage report generated" >> $GITHUB_STEP_SUMMARY
            # Count lines in hooks module
            grep -E "^SF:.*hooks" lcov.info | wc -l | xargs -I {} echo "- Hook files covered: {}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage generation skipped or failed" >> $GITHUB_STEP_SUMMARY
          fi
