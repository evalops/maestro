name: version-bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semver bump to prepare"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      base_ref:
        description: "Base branch to cut the release PR from"
        required: false
        default: main
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.base_ref || 'main' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-bump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.base_ref || 'main' }}

      - uses: ./.github/actions/setup-bun-nx

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versioned files
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}
        run: npm run "version:${BUMP_TYPE}"

      - id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=release/v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit release branch
        env:
          RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "::error::Version bump did not produce any file changes." >&2
            exit 1
          fi
          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "::error::Remote branch $RELEASE_BRANCH already exists." >&2
            exit 1
          fi
          git switch -c "$RELEASE_BRANCH"
          git add .
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git push --set-upstream origin "$RELEASE_BRANCH"

      - name: Open or reuse release PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.event.inputs.base_ref || 'main' }}
          RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          pr_body=$(cat <<EOF
          ## Summary

          - prepare release v${RELEASE_VERSION}
          - update generated metadata and release artifacts

          ## Validation

          - Generated by the \`version-bump\` workflow
          EOF
          )

          existing_pr=$(gh pr list \
            --base "$BASE_REF" \
            --head "$RELEASE_BRANCH" \
            --json number,url \
            --jq '.[0].url // ""')

          if [[ -n "$existing_pr" ]]; then
            echo "Release PR already exists: $existing_pr"
            exit 0
          fi

          gh pr create \
            --base "$BASE_REF" \
            --head "$RELEASE_BRANCH" \
            --title "Release v${RELEASE_VERSION}" \
            --body "$pr_body"
