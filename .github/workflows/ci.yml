name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NX_DAEMON: false

jobs:
  pr-checks:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-nx

      - name: Lint
        run: bun run bun:lint

      - name: Test (Nx affected)
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha }}
          NX_HEAD: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci-nx-tests.sh

      - name: Upload Nx test logs (if any)
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: nx-tests-logs-${{ github.run_id }}
          path: nx-tests-attempt-*.log
          if-no-files-found: ignore
