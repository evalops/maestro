name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_DAEMON: false

jobs:
  pr-checks:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-nx
        with:
          ensure-ripgrep: "true"

      - name: Lint
        run: bun run bun:lint

      - name: Test (Nx affected)
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          NX_HEAD: ${{ github.event.pull_request.head.sha || 'HEAD' }}
        run: bash scripts/ci-nx-tests.sh

      - name: Build
        run: npm run build

      - name: Upload Nx test logs (if any)
        if: ${{ always() && hashFiles('nx-tests-attempt-*.log') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nx-tests-logs-${{ github.run_id }}
          path: nx-tests-attempt-*.log
          if-no-files-found: ignore

  coverage-scope:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.scope.outputs.should_run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPENDENCIES_PR: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'dependencies') }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "pull_request" || "$DEPENDENCIES_PR" != "true" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          if [[ -z "$changed_files" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_run=false
          while IFS= read -r path; do
            case "$path" in
              .github/*|docs/*|README.md|CHANGELOG.md|package.json|package-lock.json|bun.lockb|flake.lock|flake.nix|tool-versions.json|packages/*/package.json)
                ;;
              *)
                should_run=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

  coverage:
    needs: coverage-scope
    if: ${{ needs.coverage-scope.outputs.should_run == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-nx
        with:
          ensure-ripgrep: "true"

      - name: Build all packages
        run: npm run build:all

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage/
          if-no-files-found: ignore
