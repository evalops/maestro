name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_DAEMON: false

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-nx

      - name: Lint
        run: bun run bun:lint

      - name: Test (Nx affected)
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          NX_HEAD: ${{ github.event.pull_request.head.sha || 'HEAD' }}
        run: bash scripts/ci-nx-tests.sh

      - name: Build
        run: npm run build

      - name: Upload Nx test logs (if any)
        if: ${{ always() && hashFiles('nx-tests-attempt-*.log') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nx-tests-logs-${{ github.run_id }}
          path: nx-tests-attempt-*.log
          if-no-files-found: ignore

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-nx

      - name: Build all packages
        run: npm run build:all

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage/
          if-no-files-found: ignore
