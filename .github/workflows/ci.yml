name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NX_DAEMON: false

jobs:
  pr-checks:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-nx

      - name: Lint
        run: bun run bun:lint

      - name: Test (Nx affected)
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha }}
          NX_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Ensure the base/head commits exist locally (actions/checkout fetch-depth: 0 should cover this,
          # but being defensive avoids edge cases with unusual refs).
          for sha in "$NX_BASE" "$NX_HEAD"; do
            if ! git cat-file -e "$sha^{commit}" 2>/dev/null; then
              git fetch --no-tags origin "$sha"
            fi
          done
          # If global config changes, be conservative and run all tests.
          if git diff --name-only "$NX_BASE" "$NX_HEAD" | grep -qE '^(nx\.json|project\.json|tsconfig\.base\.json|package\.json|bun\.lockb|package-lock\.json|packages/.*/project\.json)$'; then
            npx nx run-many -t test --all --parallel=3
          else
            npx nx affected -t test --base="$NX_BASE" --head="$NX_HEAD" --parallel=3
          fi
